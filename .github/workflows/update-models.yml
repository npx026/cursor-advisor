name: Update Cursor Model Data

on:
  schedule:
    - cron: '37 14 * * 2'  # Every Tuesday 14:37 UTC (low-traffic window)
  workflow_dispatch:        # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update-models:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Jitter delay
        run: |
          DELAY=$(( RANDOM % 90 + 30 ))
          echo "Waiting ${DELAY}s to avoid predictable request timing …"
          sleep "$DELAY"

      - name: Fetch model data and write JSON
        run: python tools/cursor_advisor.py --json-output models.json --no-color

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models.json tools/cursor_advisor.py
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore: update cursor model data ($(date -u +%Y-%m-%d))"
            git push
          fi
